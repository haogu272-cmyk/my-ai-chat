<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>AI 智能体</title>
  <style>
    body { font-family: Arial; margin: 30px; background: #f0f5ff; }
    .box { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    textarea { width: 100%; height: 80px; padding: 10px; margin: 10px 0; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    #result { margin-top: 20px; padding: 15px; background: #e9f7fe; border-radius: 5px; min-height: 50px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🤖 和 AI 对话</h2>
    <textarea id="input" placeholder="输入你的问题..."></textarea><br>
    <button onclick="sendMessage()">发送</button>
    <div id="result">等待输入...</div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('input').value.trim();
      if (!input) return alert('请输入问题！');
      
      const resultDiv = document.getElementById('result');
      resultDiv.innerText = '思考中...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input })
        });
        const data = await res.json();

        // 获取原始响应文本
        let aiResponse = data.text || data.error || '未知错误';

        // 清理引用标记：过滤以 [1]:, [2]:, [^1]: 等开头的行
        aiResponse = aiResponse
          .split('\n')
          .filter(line => {
            const trimmed = line.trim();
            // 跳过空行或纯引用行（支持 [1]: 或 [^1]: 格式）
            return !(trimmed.startsWith('[') && (trimmed.includes(']:') || trimmed.match(/^\[\^?\d+\]\s*$/)));
          })
          .join('\n')
          .trim();

        // 可选：进一步清理行内残留的 [1], [^2] 等标记
        aiResponse = aiResponse.replace(/\s*\[\^?\d+\]\s*/g, ' ');

        resultDiv.innerText = aiResponse;
      } catch (err) {
        resultDiv.innerText = '❌ 网络错误，请确保后端正在运行';
      }
    }
  </script>
</body>
</html>

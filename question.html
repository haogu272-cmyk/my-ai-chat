<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>AI 智能体</title>
  <style>
    body { font-family: Arial; margin: 30px; background: #f0f5ff; }
    .box { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
    textarea { width: 100%; height: 80px; padding: 10px; margin: 10px 0; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    #result { margin-top: 20px; padding: 15px; background: #e9f7fe; border-radius: 5px; min-height: 50px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🤖 和 AI 对话</h2>
    <textarea id="input" placeholder="输入你的问题..."></textarea><br>
    <button onclick="sendMessage()">发送</button>
    <div id="result">等待输入...</div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById('input').value.trim();
      if (!input) return alert('请输入问题！');
      
      const resultDiv = document.getElementById('result');
      resultDiv.innerText = '思考中...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: input })
        });
        const data = await res.json();
        resultDiv.innerText = data.text || data.error || '未知错误';
      } catch (err) {
        resultDiv.innerText = '❌ 网络错误，请确保后端正在运行';
      }
    }
  </script>
</body>
</html>
